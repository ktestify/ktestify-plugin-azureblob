# cliff.toml — git-cliff changelog configuration for ktestify
# Docs: https://git-cliff.org/docs/configuration

# ── GitHub integration ─────────────────────────────────────────────────────────
# Enriches commits with PR numbers, usernames, and first-time contributor info.
# Token is supplied at runtime via the GITHUB_TOKEN env variable.
[remote.github]
owner = "ktestify"
repo  = "ktestify-plugin-azureblob"

# ── Changelog layout ──────────────────────────────────────────────────────────
[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.\n
"""

body = """
{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [Unreleased]
{%- endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.breaking %}⚠️ **BREAKING** {% endif %}\
{{ commit.message | split(pat="\n") | first | upper_first | trim }}\
{% if commit.scope %} *({{ commit.scope }})*{% endif %}\
{% if commit.remote.username %} — [@{{ commit.remote.username }}](https://github.com/{{ commit.remote.username }}){% endif %}\
{% if commit.remote.pr_number %} ([#{{ commit.remote.pr_number }}](https://github.com/ktestify/ktestify-corepull/{{ commit.remote.pr_number }})){% endif %}
{% endfor %}
{% endfor %}\
{% if github.contributors | filter(attribute="is_first_time", value=true) | length != 0 %}
### 🎉 New Contributors
{% for contributor in github.contributors | filter(attribute="is_first_time", value=true) %}
{% if contributor.pr_number %}- @{{ contributor.username }} made their first contribution \
in [#{{ contributor.pr_number }}](https://github.com/ktestify/ktestify-corepull/{{ contributor.pr_number }})
{% endif %}
{%- endfor %}
{% endif %}\n
"""

footer = """
---
*Generated by [git-cliff](https://github.com/orhun/git-cliff)*
"""
trim = true

# ── Git commit parsing ────────────────────────────────────────────────────────
[git]
conventional_commits   = true
# Keep filter_unconventional = false so that any commits that don't strictly
# follow Conventional Commits still reach the commit_parsers below.
filter_unconventional  = false
split_commits          = false

commit_parsers = [
    # ── skip noise ──────────────────────────────────────────────────────────
    { message = "^Merge",                skip = true },   # merge commits
    { message = "^chore\\(release\\)",   skip = true },   # release bot commits
    { message = "^deps\\(ci\\)",          skip = true },   # CI-only changes
    { message = "^style",                skip = true },   # formatting-only
    { message = "^docs\\(changelog\\)",  skip = true },   # legacy changelog bot commits

    # ── Dependabot / deps ────────────────────────────────────────────────────
    # Dependabot uses "deps(scope):" with include: "scope", producing commits
    # like "deps(kafka): bump org.apache.kafka …". Match on "^deps" so all
    # package-ecosystem updates are captured in one section.
    { message = "^deps",                 group = "⬆️ Dependency Updates" },

    # ── conventional types → sections ───────────────────────────────────────
    { message = "^feat",               group = "✨ Features"       },
    { message = "^fix",                group = "🐛 Bug Fixes"      },
    { message = "^perf",               group = "⚡ Performance"    },
    { message = "^refactor",           group = "♻️ Refactoring"    },
    { message = "^test",               group = "🧪 Tests"          },
    { message = "^doc",                group = "📖 Documentation"  },
    { message = "^revert",             group = "⏪ Reverts"         },
    { message = "^chore",              group = "🔧 Miscellaneous"  },   # catch-all chore

    # ── drop everything else (unrecognised / pure noise) ────────────────────
    # This catches merge commits that slipped through, "First commit",
    # "Spotless apply", etc. — anything not matched by a rule above.
    { message = ".*",                  skip = true },
]

protect_breaking_commits = true    # never skip a commit flagged as breaking
filter_commits           = false
tag_pattern              = "v[0-9].*"
skip_tags                = "alpha|beta"
ignore_tags              = "rc"
topo_order               = false
sort_commits             = "oldest"

link_parsers = [
    # Auto-link #123 → GitHub issue
    { pattern = "#(\\d+)", href = "https://github.com/ktestify/ktestify-coreissues/$1" },
]

# ── Automatic version bumping ─────────────────────────────────────────────────
[bump]
features_always_bump_minor  = true    # feat → minor bump
breaking_always_bump_major  = true    # BREAKING CHANGE → major bump
initial_tag                 = "0.1.0"

