# ============================================================
# Integration Tests — Testcontainers + Azurite @integration
#
# Triggered on:
#   - Manual dispatch (workflow_dispatch)   → any branch
#   - Push / PR to main (paths that affect integration behaviour)
#
# What it does:
#   1. Builds ktestify-core (local install — no Maven Central needed)
#   2. Runs `mvn verify -Pintegration-tests` on ktestify-plugin-azureblob
#      → Integration tests start Azurite (Azure Blob Storage emulator)
#        via Testcontainers, then run all @integration scenarios
#   3. Uploads the Failsafe XML reports as a run artefact
#   4. Posts a sticky summary to the PR (if triggered by a PR)
# ============================================================
name: Integration Tests

on:
  workflow_dispatch:
    inputs:
      tags:
        description: "Test group filter (e.g. integration)"
        required: false
        default: "integration"
  push:
    branches: [ main ]
    paths:
      - "src/**"
      - "pom.xml"
      - "../ktestify-core/src/**"
      - "../ktestify-core/pom.xml"
  pull_request:
    branches: [ main ]
    paths:
      - "src/**"
      - "pom.xml"
      - "../ktestify-core/src/**"
      - "../ktestify-core/pom.xml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  JAVA_VERSION: "25"
  MAVEN_OPTS: >-
    -Xmx2048m
    -XX:+EnableDynamicAgentLoading
    -Dmaven.repo.local=${{ github.workspace }}/.m2/repository

permissions:
  contents: read

# ──────────────────────────────────────────────────────────────
jobs:

  integration-tests:
    name: 🧪 Integration Tests (Azurite)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # for the sticky PR comment

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v6

      # ── 2. Java ──────────────────────────────────────────────
      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      # ── 3. Build ktestify-core (local Maven install) ─────────
      - name: 🔨 Build & install ktestify-core
        working-directory: ktestify-core
        run: |
          mvn install \
            --no-transfer-progress \
            -DskipTests \
            -Dspotless.check.skip=true

      # ── 4. Run integration tests via Testcontainers ───────────
      #
      # Integration IT (picked up by maven-failsafe-plugin) will:
      #   • Start Azurite (mcr.microsoft.com/azure-storage/azurite) via Testcontainers
      #   • Wire dynamic host/port values into the plugin config
      #   • Execute all integration test scenarios
      # ─────────────────────────────────────────────────────────
      - name: 🧪 Run integration tests (Testcontainers + Azurite)
        run: |
          mvn verify \
            --no-transfer-progress \
            -Pintegration-tests \
            -Dspotless.check.skip=true
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"

      # ── 5. Upload Failsafe XML reports ────────────────────────
      - name: 📦 Upload Failsafe reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: failsafe-reports-${{ github.run_id }}
          path: target/failsafe-reports/
          retention-days: 30

      # ── 6. Parse Failsafe XML → Step Summary + PR comment ─────
      - name: 📊 Generate integration test report
        if: always()
        run: |
          python3 << 'PYEOF'
          import xml.etree.ElementTree as ET
          import glob, os, sys

          total = failures = errors = skipped = 0
          failed_list = []

          for path in sorted(glob.glob('target/failsafe-reports/TEST-*.xml')):
              try:
                  root = ET.parse(path).getroot()
                  suite_name = root.get('name', path)
                  for tc in root.findall('.//testcase'):
                      total += 1
                      if tc.find('failure') is not None:
                          failures += 1
                          failed_list.append(f"{tc.get('classname', suite_name)}#{tc.get('name', '?')}")
                      elif tc.find('error') is not None:
                          errors += 1
                          failed_list.append(f"{tc.get('classname', suite_name)}#{tc.get('name', '?')}")
                      elif tc.find('skipped') is not None:
                          skipped += 1
              except Exception as e:
                  print(f'Warning: could not parse {path}: {e}')

          passed = total - failures - errors - skipped
          status = '✅' if failures + errors == 0 else '❌'

          lines = [
              f'## {status} Integration Test Results — Azure Blob Storage\n',
              '| | Metric | Count |',
              '|:---:|:---|---:|',
              f'| ✅ | Passed   | {passed}  |',
              f'| ❌ | Failed   | {failures + errors}  |',
              f'| ⏭️ | Skipped  | {skipped} |',
              f'| 📊 | **Total**| **{total}** |',
          ]

          if failed_list:
              lines += ['', '### ❌ Failed Tests']
              for s in failed_list[:20]:
                  lines += [f'- `{s}`']
              if len(failed_list) > 20:
                  lines += [f'- *… and {len(failed_list) - 20} more*']

          report = '\n'.join(lines) + '\n'

          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
              f.write(report)
          with open('/tmp/integration-report.md', 'w') as f:
              f.write(report)

          print(report)
          PYEOF

      - name: 💬 Post integration report to PR
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            if (!fs.existsSync('/tmp/integration-report.md')) {
              console.log('Integration report file not found — skipping comment.');
              return;
            }

            const marker  = '<!-- ktestify-azureblob-integration-report -->';
            const runUrl  = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const content = fs.readFileSync('/tmp/integration-report.md', 'utf8');
            const body    = `${marker}\n${content}\n---\n*🔄 [Integration run #${process.env.GITHUB_RUN_NUMBER}](${runUrl}) · ${new Date().toUTCString()}*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              per_page:     100,
            });

            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log(`✅ Updated integration report comment #${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              console.log('✅ Created new integration report comment');
            }


