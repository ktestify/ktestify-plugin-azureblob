# Dependabot Configuration
# ============================================================
version: 2

updates:

  # ── Maven dependencies ────────────────────────────────────
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Paris
    # Auto-rebase PRs that fall behind main
    rebase-strategy: auto
    open-pull-requests-limit: 15
    labels:
      - dependencies
      - java
    commit-message:
      # "deps: bump …" → parsed by git-cliff into "⬆️ Dependency Updates"
      prefix: "deps"
      include: "scope"

    groups:
      # ── Version-update groups (reduce weekly PR noise) ──────
      azure:
        applies-to: version-updates
        patterns:
          - "com.azure:*"
          - "com.azure.spring:*"
      testcontainers:
        applies-to: version-updates
        patterns:
          - "org.testcontainers:*"
      junit5:
        applies-to: version-updates
        patterns:
          - "org.junit.jupiter:*"
          - "org.junit.platform:*"
      mockito:
        applies-to: version-updates
        patterns:
          - "org.mockito:*"
      commons:
        applies-to: version-updates
        patterns:
          - "org.apache.commons:*"
          - "commons-*:*"
      logging:
        applies-to: version-updates
        patterns:
          - "org.slf4j:*"
          - "ch.qos.logback:*"
          - "org.apache.logging.log4j:*"

    # ── Ignore major bumps for ecosystems with breaking changes ─
    # Azure SDK major bumps require deliberate migration work.
    ignore:
      - dependency-name: "com.azure:*"
        update-types: [ "version-update:semver-major" ]

  # ── GitHub Actions ────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Paris
    rebase-strategy: auto
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "deps(ci)"
      include: "scope"
    groups:
      actions-core:
        applies-to: version-updates
        patterns: [ "actions/*" ]

