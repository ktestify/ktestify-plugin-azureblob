# =============================================================================
# Log4j2 Properties Configuration ? ktestify-plugin-azureblob
# =============================================================================
# These are STARTUP defaults only.
# At runtime, KtestifyConfig.load() overrides these levels from the HOCON
# ktestify.logging section (reference.conf / application.conf / config.file).
#
# HOCON keys           | Env variable                      | Affects
# ---------------------|-----------------------------------|----------------------------
# logging.level        | KTESTIFY_LOG_LEVEL                | io.github.ktestify.*
# logging.root-level   | KTESTIFY_ROOT_LOG_LEVEL           | root logger
# logging.testcontainers-level | KTESTIFY_TC_LOG_LEVEL     | org.testcontainers / tc / dockerjava
# =============================================================================

status = warn
name  = KtestifyAzureBlobPlugin

# =============================================================================
# Properties ? reusable variables
# =============================================================================

property.LOG_FILE = target/logs/ktestify-azureblob.log

# Console pattern ? full line coloured by level via %highlight
# Timestamp  ? bright black (dark grey)
# [thread]   ? white
# Level      ? colour per level (see style map)
# Logger     ? bright blue, abbreviated to 36 chars
# Message    ? follows level colour
property.CONSOLE_PATTERN = %style{%d{HH:mm:ss.SSS}}{bright,black} %highlight{[%t] %-5level}{FATAL=red bold blink, ERROR=red bold, WARN=yellow bold, INFO=bright green, DEBUG=cyan, TRACE=white} %style{%logger{36}}{bright,blue} - %highlight{%msg%n}{FATAL=red, ERROR=red, WARN=yellow, INFO=default, DEBUG=default, TRACE=default}

# File pattern ? plain text, no ANSI codes
property.FILE_PATTERN = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{50} - %msg%n

# =============================================================================
# Appenders
# =============================================================================

# ?? Console ????????????????????????????????????????????????????????????????????
appender.console.type                        = Console
appender.console.name                        = CONSOLE
appender.console.target                      = SYSTEM_OUT
appender.console.layout.type                 = PatternLayout
appender.console.layout.pattern              = ${CONSOLE_PATTERN}
appender.console.layout.disableAnsi          = false

# ?? Rolling file ???????????????????????????????????????????????????????????????
appender.file.type                           = RollingFile
appender.file.name                           = FILE
appender.file.fileName                       = ${LOG_FILE}
appender.file.filePattern                    = target/logs/ktestify-azureblob-%d{yyyy-MM-dd}-%i.log.gz
appender.file.append                         = false
appender.file.layout.type                    = PatternLayout
appender.file.layout.pattern                 = ${FILE_PATTERN}
appender.file.policies.type                  = Policies
appender.file.policies.startup.type          = OnStartupTriggeringPolicy
appender.file.policies.size.type             = SizeBasedTriggeringPolicy
appender.file.policies.size.size             = 10 MB
appender.file.strategy.type                  = DefaultRolloverStrategy
appender.file.strategy.max                   = 5

# =============================================================================
# Loggers
# =============================================================================

# ?? ktestify ? DEBUG ? CONSOLE + FILE ?????????????????????????????????????????
logger.ktestify.name                         = io.github.ktestify
logger.ktestify.level                        = DEBUG
logger.ktestify.additivity                   = false
logger.ktestify.appenderRef.console.ref      = CONSOLE
logger.ktestify.appenderRef.file.ref         = FILE

# ?? Azure SDK ? reduce verbosity (HTTP wire logs are very noisy) ???????????????
logger.azure.name                            = com.azure
logger.azure.level                           = WARN
logger.azure.additivity                      = false
logger.azure.appenderRef.console.ref         = CONSOLE

logger.azureCore.name                        = com.azure.core
logger.azureCore.level                       = WARN
logger.azureCore.additivity                  = false
logger.azureCore.appenderRef.console.ref     = CONSOLE

logger.azureStorage.name                     = com.azure.storage
logger.azureStorage.level                    = WARN
logger.azureStorage.additivity               = false
logger.azureStorage.appenderRef.console.ref  = CONSOLE

# ?? Testcontainers ? reduce verbosity ?????????????????????????????????????????
logger.tc1.name                              = org.testcontainers
logger.tc1.level                             = INFO
logger.tc1.additivity                        = false
logger.tc1.appenderRef.console.ref           = CONSOLE

logger.tc2.name                              = tc
logger.tc2.level                             = INFO
logger.tc2.additivity                        = false
logger.tc2.appenderRef.console.ref           = CONSOLE

logger.dockerjava.name                       = com.github.dockerjava
logger.dockerjava.level                      = WARN
logger.dockerjava.additivity                 = false
logger.dockerjava.appenderRef.console.ref    = CONSOLE

# ?? Root ???????????????????????????????????????????????????????????????????????
rootLogger.level                             = INFO
rootLogger.appenderRef.console.ref           = CONSOLE

