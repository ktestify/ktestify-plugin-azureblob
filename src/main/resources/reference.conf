# ktestify Azure Blob Storage Plugin — Default Configuration
# ===========================================================
# Override any value in your application.conf or via the corresponding environment variable.
# All sensitive values should be set via environment variables rather than checked-in config files.

ktestify.plugins.azure-blob {

  # ── Authentication ──────────────────────────────────────────────────────────
  # Priority order (highest to lowest):
  #   1. connection-string  (recommended — single credential, no separate account name needed)
  #   2. account-name + account-key
  #   3. account-name + sas-token
  # You may provide credentials per-scenario via the DataTable instead of here.

  # Azure Storage connection string.
  # Example: DefaultEndpointsProtocol=https;AccountName=...;AccountKey=...;EndpointSuffix=core.windows.net
  connection-string = ""
  connection-string = ${?KTESTIFY_AZURE_BLOB_CONNECTION_STRING}

  # Azure Storage account name (used with account-key or sas-token auth).
  account-name = ""
  account-name = ${?KTESTIFY_AZURE_BLOB_ACCOUNT_NAME}

  # Azure Storage account key.
  account-key = ""
  account-key = ${?KTESTIFY_AZURE_BLOB_ACCOUNT_KEY}

  # Shared Access Signature token.
  sas-token = ""
  sas-token = ${?KTESTIFY_AZURE_BLOB_SAS_TOKEN}

  # ── Timing ──────────────────────────────────────────────────────────────────

  # Maximum time to wait for a blob to appear before failing the step.
  # Overridden per-step via the 'readTimeout' DataTable column (seconds).
  read-timeout = 30s
  read-timeout = ${?KTESTIFY_AZURE_BLOB_READ_TIMEOUT}

  # Interval between existence-check polls when waiting for a blob.
  poll-interval = 500ms
}

